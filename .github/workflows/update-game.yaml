name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'
    workflow_displatch:

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: czl9707/gh-space-shooter@v1
        with:
          github-token: ${{ secrets.GITHUB-TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'
