name: My First CI

on:
  # Run on pushes to main or develop
  push:
    branches:
      - main
      - develop
      - feature/*  # This line (if applied) makes sure that ci workflow will run on every branch that starts with feature/...
  # Run on pull requests targeting main
  # Runs when PR is opened not when it is approved!
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies 
        run: pip install ruff

      - name: Run ruff
        run: ruff check .
  
  test:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest] # we can also pass windows-latest, etc...
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup python 
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}

      - name: Install Dependencies 
        run: pip install pytest pytest-cov

      - name: Run tests
        run: pytest --cov=. --cov-report=html

      - name: Upload coverage cov report 
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{matrix.python-version}}
          path: ./htmlcov
          retention-days: 30


