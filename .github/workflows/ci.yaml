name: My First CI

on:
  # Run on pushes to main or develop
  push:
    branches:
      - main
      - develop
      - feature/*  # This line (if applied) makes sure that ci workflow will run on every branch that starts with feature/...
  # Run on pull requests targeting main
  # Runs when PR is opened not when it is approved!
  pull_request:
    branches:
      - main
      - develop

jobs:
  run-python:
    strategy:
      matrix:
        os: [ubuntu-latest]
        # cutting this one out for now since it slows down builds but it works
        # , windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}

      - name: Install dependencies
        run: pip install pytest ruff

      - name: Run ruff
        run: ruff check .

      - name: Run tests
        run: pytest
